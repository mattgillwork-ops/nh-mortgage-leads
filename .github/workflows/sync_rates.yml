name: Daily Rate Sync

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "Error: SUPABASE_URL is missing"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then echo "Error: SUPABASE_SERVICE_ROLE_KEY is missing"; exit 1; fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests playwright
          python -m playwright install chromium

      - name: Run daily audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python tools/daily_rate_audit.py

      - name: Upload Debug Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-debug-info
          path: |
            sync_failure.png
            sync_failure.html
