name: Daily Rate Engine Audit

on:
  schedule:
    - cron: '0 10 * * *' # Runs daily at 10:00 AM UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  audit_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Rate Audit
        run: |
          # A sovereign scraping script to find the latest NH rates
          python scripts/cloud_rate_audit.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/rates.json
          git commit -m "AUTONOMOUS: Daily Rate Update (${{ steps.date.outputs.date }})" || echo "No changes to commit"
          git push
