
version: '3.8'

services:
  # The Agency Command Center
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: antigravity-dashboard
    ports:
      - "8000:8000"
    volumes:
      # Selective Mounts for Security & Isolation
      - ./backend:/workspace/backend:rw
      - ./agents:/workspace/agents:rw
      - ./tools:/workspace/tools:rw
      - ./tru/Memory_Logs:/workspace/tru/Memory_Logs:rw
      - ./tru/Projects:/workspace/tru/Projects:rw
      - ./tru/Core_Rules:/workspace/tru/Core_Rules:ro  # READ-ONLY IDENTITY
      - ./model_registry.yaml:/workspace/model_registry.yaml:ro
      - ./.env:/workspace/.env:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /workspace
    command: python backend/app.py
    restart: unless-stopped
    networks:
      - anti-net



networks:
  anti-net:
    driver: bridge
