
version: '3.8'

services:
  # The Agency Command Center
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: antigravity-dashboard
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: python backend/app.py
    restart: unless-stopped
    networks:
      - anti-net



networks:
  anti-net:
    driver: bridge
